version: '3.8'

services:
  weather-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-stocks-local:latest
    container_name: weather-service
    working_dir: /app
    command: uvicorn services.weather_service.api:app --host 0.0.0.0 --port 9001
    ports:
      - "9001:9001"
    env_file:
      - .env

  weather-server:
    image: agentic-stocks-local:latest
    container_name: mcp-weather-server
    working_dir: /app
    command: python -m mcp_servers.weather_server
    depends_on:
      - weather-service
    environment:
      - WEATHER_SERVICE_URL=http://weather-service:9001
    ports:
      - "8000:8000"
    env_file:
      - .env

  stock-service:
    image: agentic-stocks-local:latest
    container_name: stock-service
    working_dir: /app
    command: uvicorn services.stock_service.api:app --host 0.0.0.0 --port 9002
    ports:
      - "9002:9002"
    env_file:
      - .env
    depends_on:
      - weather-service

  stock-server:
    image: agentic-stocks-local:latest
    container_name: mcp-stock-server
    working_dir: /app
    command: python -m mcp_servers.stock_server
    depends_on:
      - stock-service
    environment:
      - STOCK_SERVICE_URL=http://stock-service:9002
    ports:
      - "8001:8001"
    env_file:
      - .env

  news-service:
    image: agentic-stocks-local:latest
    container_name: news-service
    working_dir: /app
    command: uvicorn services.news_service.api:app --host 0.0.0.0 --port 9003
    ports:
      - "9003:9003"
    env_file:
      - .env
    depends_on:
      - weather-service

  news-server:
    image: agentic-stocks-local:latest
    container_name: mcp-news-server
    working_dir: /app
    command: python -m mcp_servers.news_server
    depends_on:
      - news-service
    environment:
      - NEWS_SERVICE_URL=http://news-service:9003
    ports:
      - "8003:8003"
    env_file:
      - .env

  postgres:
    image: pgvector/pgvector:pg15
    container_name: hermes_postgres
    restart: always
    environment:
      POSTGRES_USER: hermes # ฝาก เขียนให้ง่ายด้วย
      POSTGRES_PASSWORD: hermes_pass
      POSTGRES_DB: hermes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hermes -d hermes_db" ]
      interval: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: hermes_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  memory-service:
    image: agentic-stocks-local:latest
    container_name: memory-service
    working_dir: /app
    command: uvicorn memory.main:app --host 0.0.0.0 --port 8000
    ports:
      - "9004:8000"
    environment:
      DATABASE_URL: postgresql://hermes:hermes_pass@postgres:5432/hermes_db
    depends_on:
      postgres:
        condition: service_healthy
      weather-service:
        condition: service_started
    restart: always

volumes:
  pgdata:
